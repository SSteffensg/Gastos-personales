<title>Gastos Personal</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0F172A; --surface: #1E293B; --surface2: #293548; --border: #334155;
    --text: #F1F5F9; --text2: #94A3B8; --text3: #64748B;
    --accent: #3B82F6; --pos: #22C55E; --neg: #EF4444;
    --radius: 12px; --radius-sm: 8px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
    font-size: 15px; -webkit-font-smoothing: antialiased; }
  #root { height: 100%; display: flex; flex-direction: column; max-width: 520px; margin: 0 auto; }
  .app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  .scroll { flex: 1; overflow-y: auto; padding: 16px; padding-bottom: 80px; }
  .scroll::-webkit-scrollbar { display: none; }
  /* Cards */
  .card { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
  .card-sm { background: var(--surface); border-radius: var(--radius-sm); padding: 12px; }
  /* TabBar */
  .tabbar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 520px; background: var(--surface); border-top: 1px solid var(--border);
    display: flex; padding: 8px 0 max(8px, env(safe-area-inset-bottom)); z-index: 100; }
  .tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; cursor: pointer; color: var(--text3);
    font-size: 10px; padding: 4px 0; transition: color .15s; }
  .tab.active { color: var(--accent); }
  .tab-icon { font-size: 20px; line-height: 1; }
  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between;
    padding: 16px 16px 8px; gap: 8px; }
  .header-title { font-size: 22px; font-weight: 700; }
  /* Month nav */
  .month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .month-label { font-size: 20px; font-weight: 700; }
  .nav-btn { background: none; border: none; cursor: pointer; color: var(--accent);
    font-size: 22px; padding: 4px 8px; border-radius: 8px;
    transition: background .15s; -webkit-tap-highlight-color: transparent; }
  .nav-btn:hover { background: var(--surface2); }
  .nav-btn:disabled { color: var(--text3); cursor: default; }
  /* Total card */
  .total-card { background: linear-gradient(135deg, #1e3a5f 0%, #1E293B 100%);
    border-radius: var(--radius); padding: 20px; margin-bottom: 10px; }
  .total-label { font-size: 12px; color: var(--text2); text-transform: uppercase;
    letter-spacing: .5px; margin-bottom: 4px; }
  .total-amount { font-size: 36px; font-weight: 800; letter-spacing: -1px; margin-bottom: 14px; }
  .filter-pills { display: flex; gap: 8px; }
  .pill { padding: 5px 12px; border-radius: 20px; border: none; cursor: pointer; font-size: 12px;
    font-weight: 500; transition: all .15s; -webkit-tap-highlight-color: transparent; }
  .pill.active { background: var(--accent); color: #fff; }
  .pill.inactive { background: var(--surface2); color: var(--text2); }
  /* Category card */
  .cat-card { background: var(--surface); border-radius: var(--radius); padding: 14px 16px;
    margin-bottom: 8px; cursor: pointer; transition: background .15s;
    -webkit-tap-highlight-color: transparent; }
  .cat-card:hover { background: var(--surface2); }
  .cat-row { display: flex; align-items: center; gap: 12px; }
  .cat-icon-wrap { width: 40px; height: 40px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .cat-info { flex: 1; min-width: 0; }
  .cat-name { font-size: 14px; font-weight: 600; }
  .cat-sub { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .cat-amount { font-size: 15px; font-weight: 700; white-space: nowrap; }
  .progress-bar { height: 3px; border-radius: 2px; margin-top: 10px; background: var(--border); overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; transition: width .4s ease; }
  /* Excluded */
  .excluded-toggle { display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; cursor: pointer; background: var(--surface);
    border-radius: var(--radius); margin-bottom: 8px; }
  .excluded-row { padding: 10px 16px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; }
  /* Import */
  .import-card { background: var(--surface); border-radius: var(--radius);
    margin-bottom: 10px; overflow: hidden; cursor: pointer;
    transition: background .15s; -webkit-tap-highlight-color: transparent; }
  .import-card:hover { background: var(--surface2); }
  .import-header { display: flex; align-items: center; gap: 14px; padding: 16px; }
  .import-icon { width: 48px; height: 48px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; }
  .import-body { padding: 0 16px 16px; border-top: 1px solid var(--border); }
  /* Inputs */
  input, select { background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); border-radius: var(--radius-sm); padding: 10px 12px;
    font-size: 14px; width: 100%; outline: none; font-family: inherit;
    transition: border-color .15s; }
  input:focus, select:focus { border-color: var(--accent); }
  label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; margin-top: 12px; }
  /* Buttons */
  .btn { padding: 11px 20px; border-radius: var(--radius-sm); border: none;
    cursor: pointer; font-size: 14px; font-weight: 600; font-family: inherit;
    transition: all .15s; -webkit-tap-highlight-color: transparent; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #2563EB; }
  .btn-primary:disabled { background: var(--text3); cursor: not-allowed; }
  .btn-secondary { background: var(--surface2); color: var(--text); }
  .btn-secondary:hover { background: var(--border); }
  .btn-danger { background: rgba(239,68,68,.15); color: var(--neg); }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-full { width: 100%; margin-top: 12px; }
  /* Modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7);
    z-index: 200; display: flex; align-items: flex-end; justify-content: center; }
  .modal { background: var(--bg); border-radius: 20px 20px 0 0; width: 100%; max-width: 520px;
    max-height: 92vh; display: flex; flex-direction: column; overflow: hidden; }
  .modal-handle { width: 36px; height: 4px; background: var(--border);
    border-radius: 2px; margin: 10px auto 14px; flex-shrink: 0; }
  .modal-header { display: flex; justify-content: space-between; align-items: center;
    padding: 0 16px 14px; flex-shrink: 0; }
  .modal-title { font-size: 18px; font-weight: 700; }
  .modal-scroll { overflow-y: auto; flex: 1; padding: 0 0 20px; }
  .modal-scroll::-webkit-scrollbar { display: none; }
  .modal-footer { padding: 12px 16px max(16px, env(safe-area-inset-bottom)); flex-shrink: 0;
    border-top: 1px solid var(--border); background: var(--bg); }
  /* Review row */
  .review-row { display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .review-meta { flex: 1; min-width: 0; }
  .review-desc { font-size: 14px; font-weight: 500; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; }
  .review-detail { font-size: 11px; color: var(--text2); margin-top: 2px; display: flex; gap: 8px; }
  .review-right { text-align: right; flex-shrink: 0; }
  .review-amount { font-size: 14px; font-weight: 600; }
  /* Category badge */
  .cat-badge { display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 500;
    cursor: pointer; transition: opacity .15s; white-space: nowrap; margin-top: 4px; }
  .cat-badge:hover { opacity: .75; }
  /* Holder badge */
  .holder-badge { display: inline-block; padding: 2px 6px; border-radius: 4px;
    font-size: 10px; font-weight: 500; background: rgba(255,107,53,.15); color: #FF6B35; }
  /* Section header */
  .section-header { font-size: 12px; font-weight: 600; color: var(--text2);
    text-transform: uppercase; letter-spacing: .5px; padding: 14px 16px 6px; }
  /* Summary box */
  .summary-box { display: flex; justify-content: space-between; padding: 16px;
    background: var(--surface2); border-bottom: 1px solid var(--border); }
  .summary-stat { text-align: center; }
  .summary-val { font-size: 20px; font-weight: 700; }
  .summary-lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }
  /* SVG chart */
  .chart-wrap { padding: 16px; }
  .chart-bar { cursor: pointer; transition: opacity .15s; }
  .chart-bar:hover { opacity: .75; }
  /* Tx list row */
  .tx-row { display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 16px; border-bottom: 1px solid var(--border); }
  .tx-row:last-child { border-bottom: none; }
  /* History month row */
  .hist-row { background: var(--surface); border-radius: var(--radius);
    margin-bottom: 8px; overflow: hidden; }
  .hist-summary { display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px; cursor: pointer; }
  .hist-detail { border-top: 1px solid var(--border); }
  .hist-cat-row { display: flex; justify-content: space-between;
    padding: 8px 16px; font-size: 13px; }
  /* Alert */
  .alert { padding: 12px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 10px; }
  .alert-success { background: rgba(34,197,94,.12); color: #4ade80; }
  .alert-error { background: rgba(239,68,68,.12); color: #f87171; }
  /* Empty state */
  .empty { text-align: center; padding: 48px 24px; color: var(--text2); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  /* Select in review */
  select.cat-select { padding: 4px 8px; font-size: 12px; width: auto;
    border-radius: 20px; cursor: pointer; height: auto; }
  /* Loading */
  .loading { display: flex; align-items: center; justify-content: center;
    gap: 10px; padding: 40px; color: var(--text2); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useReducer, useEffect, useCallback, useRef } = React;

// ─── CATEGORY CONFIG ──────────────────────────────────────────────────────────
let CATS = {
  'Supermercados':       { color: '#4CAF50', emoji: '🛒' },
  'Restaurantes y café': { color: '#FF6B35', emoji: '🍽️' },
  'Transporte':          { color: '#2196F3', emoji: '🚗' },
  'Servicios básicos':   { color: '#9C27B0', emoji: '⚡' },
  'Salud':               { color: '#E91E63', emoji: '❤️' },
  'Educación y libros':  { color: '#009688', emoji: '📚' },
  'Deportes':            { color: '#FF9800', emoji: '🏃' },
  'Ropa y calzado':      { color: '#F06292', emoji: '👕' },
  'Hogar y deco':        { color: '#795548', emoji: '🏠' },
  'Belleza y cuidado':   { color: '#FF80AB', emoji: '✨' },
  'Tecnología':          { color: '#00BCD4', emoji: '💻' },
  'Pagos municipales':   { color: '#607D8B', emoji: '🏛️' },
  'Seguros':             { color: '#3F51B5', emoji: '🛡️' },
  'Entretenimiento':     { color: '#FFC107', emoji: '⭐' },
  'Viajes':              { color: '#03A9F4', emoji: '✈️' },
  'Gastos fijos':        { color: '#37474F', emoji: '🔄' },
  'Otros':               { color: '#9E9E9E', emoji: '⚙️' },
};
const BUILT_IN_CAT_NAMES = new Set(Object.keys(CATS));
// Palette for custom categories (cycles on overflow)
const CUSTOM_COLORS = ['#E53935','#8E24AA','#00897B','#F4511E','#6D4C41',
                       '#1E88E5','#43A047','#D81B60','#039BE5','#7CB342'];

// ─── SUPABASE MODULE ──────────────────────────────────────────────────────────
let _sb = null;

// Column mapping: JS camelCase ↔ DB snake_case
const txToRow = t => ({
  id: t.id, date: t.date,
  raw_description: t.rawDescription || '',
  description: t.description || '',
  amount: t.amount || 0, total_amount: t.totalAmount || 0,
  pending_cuotas: t.pendingCuotas || 0,
  category: t.category || 'Otros', card_holder: t.cardHolder || 'Titular',
  source: t.source || 'CMR', is_excluded: t.isExcluded || false,
  month_key: t.monthKey || '',
  adjusted_amount: t.adjustedAmount ?? null,
  original_amount: t.originalAmount ?? null,
  notes: t.notes ?? null,
});
const rowToTx = r => ({
  id: r.id, date: r.date,
  rawDescription: r.raw_description, description: r.description,
  amount: r.amount, totalAmount: r.total_amount,
  pendingCuotas: r.pending_cuotas, category: r.category,
  cardHolder: r.card_holder, source: r.source,
  isExcluded: r.is_excluded, monthKey: r.month_key,
  adjustedAmount: r.adjusted_amount, originalAmount: r.original_amount,
  notes: r.notes,
});

// Config stored separately so it survives localStorage key bumps
function getSbConfig() {
  try { return JSON.parse(localStorage.getItem('gastos_sb') || 'null'); } catch { return null; }
}
function setSbConfig(cfg) {
  localStorage.setItem('gastos_sb', cfg ? JSON.stringify(cfg) : 'null');
}

function initSb(url, key) {
  try { _sb = window.supabase?.createClient(url, key); return !!_sb; }
  catch(e) { return false; }
}

async function sbLoad() {
  if (!_sb) return null;
  const { data, error } = await _sb.from('transactions').select('*');
  if (error) { console.error('Supabase load:', error); return null; }
  return data.map(rowToTx);
}

let _syncTimer = null;
function sbSync(transactions) {
  if (!_sb) return;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(async () => {
    try {
      if (transactions.length > 0) {
        const { error } = await _sb.from('transactions').upsert(transactions.map(txToRow));
        if (error) throw error;
      }
      // Delete orphans
      const { data: remote } = await _sb.from('transactions').select('id');
      const localIds = new Set(transactions.map(t => t.id));
      const toDelete = (remote || []).filter(r => !localIds.has(r.id)).map(r => r.id);
      if (toDelete.length > 0) await _sb.from('transactions').delete().in('id', toDelete);
    } catch(e) { console.error('Supabase sync error:', e); }
  }, 800);
}

async function sbLoadCustomCats() {
  if (!_sb) return null;
  const { data, error } = await _sb.from('custom_categories').select('*');
  if (error) { console.error('Load custom cats:', error); return null; }
  return data || [];
}

async function sbSyncCustomCat(cat) {
  if (!_sb) return;
  try {
    await _sb.from('custom_categories')
      .upsert({ name: cat.name, emoji: cat.emoji, color: cat.color });
  } catch(e) { console.error('Sync custom cat:', e); }
}

async function sbTestConnection(url, key) {
  try {
    const client = window.supabase?.createClient(url, key);
    if (!client) return { ok: false, msg: 'Librería Supabase no cargada.' };
    const { error } = await client.from('transactions').select('id').limit(1);
    if (error) return { ok: false, msg: error.message };
    return { ok: true, client };
  } catch(e) { return { ok: false, msg: e.message }; }
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
let _id = 0;
function uid() { return Date.now().toString(36) + (++_id).toString(36); }
// Effective amount: use adjustedAmount if set (shared-expense feature)
const eff = t => (t.adjustedAmount != null ? t.adjustedAmount : t.amount);

function fmtCLP(n) {
  const abs = Math.abs(n);
  const s = new Intl.NumberFormat('es-CL').format(abs);
  return (n < 0 ? '-' : '') + '$' + s;
}
function fmtCLPShort(n) {
  const abs = Math.abs(n);
  const sign = n < 0 ? '-' : '';
  if (abs >= 1e6) return sign + '$' + (abs / 1e6).toFixed(1).replace('.', ',') + 'M';
  if (abs >= 1e3) return sign + '$' + Math.round(abs / 1e3) + 'K';
  return sign + '$' + abs;
}
function monthKeyNow() {
  const d = new Date();
  return d.toISOString().slice(0, 7);
}
function monthKeyOffset(key, delta) {
  const [y, m] = key.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  return d.toISOString().slice(0, 7);
}
function monthDisplay(key) {
  const [y, m] = key.split('-').map(Number);
  const d = new Date(y, m - 1, 1);
  return d.toLocaleDateString('es-CL', { month: 'long', year: 'numeric' })
    .replace(/^./, c => c.toUpperCase());
}
function monthShort(key) {
  const [y, m] = key.split('-').map(Number);
  const d = new Date(y, m - 1, 1);
  return d.toLocaleDateString('es-CL', { month: 'short', year: '2-digit' });
}
function fmtDate(iso) {
  const [, m, d] = iso.split('-');
  const months = ['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];
  return `${parseInt(d)} ${months[parseInt(m) - 1]}`;
}

// ─── CMR PARSER ───────────────────────────────────────────────────────────────
// Billing cycle: day 24+ belongs to the NEXT calendar month
function cmrMonthKey(isoDate) {
  const d = parseInt(isoDate.slice(8, 10));
  if (d >= 24) {
    const [y, m] = isoDate.slice(0, 7).split('-').map(Number);
    const next = new Date(y, m, 1); // JS: month m (1-based) = next month 0-indexed
    return next.toISOString().slice(0, 7);
  }
  return isoDate.slice(0, 7);
}

async function parseCMRFile(file) {
  const buffer = await file.arrayBuffer();
  const wb = XLSX.read(buffer, { type: 'array', cellDates: true });
  const ws = wb.Sheets['Movimientos Facturados'];
  if (!ws) throw new Error("No se encontró la hoja «Movimientos Facturados».");
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: true, defval: null });
  if (!rows.length) throw new Error("El archivo está vacío.");

  // ── Detect column layout by header name (2025 vs 2026 format) ──────────
  const hdrs = (rows[0] || []).map(h => String(h || '').trim().toUpperCase());
  const ci = name => hdrs.findIndex(h => h.includes(name));
  const iDate   = ci('FECHA');
  const iDesc   = ci('DESCRIPCI');
  const iHolder = ci('TITULAR');
  const iValor  = ci('VALOR CUOTA');   // must come before CUOTAS check
  const iMonto  = hdrs.findIndex(h => h.includes('MONTO') && !h.includes('VALOR'));
  const iCuotas = hdrs.findIndex(h => h.includes('CUOTAS') && !h.includes('VALOR'));
  if (iDate < 0 || iDesc < 0 || iValor < 0)
    throw new Error(`Columnas no reconocidas. Cabeceras: ${hdrs.join(', ')}`);

  const result = [];
  for (let i = 1; i < rows.length; i++) {
    const row = rows[i];
    const dateVal    = row[iDate];
    const rawDesc    = row[iDesc];
    const holder     = iHolder  >= 0 ? row[iHolder]  : 'Titular';
    const monto      = iMonto   >= 0 ? row[iMonto]   : null;
    const cuotas     = iCuotas  >= 0 ? row[iCuotas]  : 0;
    const valorCuota = row[iValor];
    if (!dateVal || !rawDesc) continue;
    // Resolve date — supports Date objects and Excel serial numbers
    let iso;
    if (dateVal instanceof Date) {
      iso = dateVal.toISOString().split('T')[0];
    } else if (typeof dateVal === 'number') {
      const d = new Date(Math.round((dateVal - 25569) * 86400 * 1000));
      iso = d.toISOString().split('T')[0];
    } else continue;
    const desc = String(rawDesc).trim();
    const normalized = normalizeCMR(desc);
    const amount  = typeof valorCuota === 'number' ? Math.round(valorCuota)
                  : typeof monto      === 'number' ? Math.round(monto) : 0;
    const total   = typeof monto      === 'number' ? Math.round(monto) : Math.abs(amount);
    const pending = typeof cuotas     === 'number' ? Math.round(cuotas) : 0;
    const cardHolder = String(holder || '').toLowerCase().includes('adicional')
                     ? 'Adicional' : 'Titular';
    const upper = desc.toUpperCase();
    const isExcluded = upper.includes('PAGO TARJETA CMR')
                    || upper.startsWith('PAGO AUTOMATICO');
    const category = isExcluded ? 'Otros' : classify(normalized);
    result.push({ id: uid(), date: iso, rawDescription: desc, description: normalized,
      amount, totalAmount: total, pendingCuotas: pending, category,
      cardHolder, source: 'CMR', isExcluded, monthKey: cmrMonthKey(iso) });
  }
  if (!result.length) throw new Error("No se encontraron transacciones en el archivo.");
  return result;
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────
function exportMonthly(monthKey, transactions) {
  const txs = transactions.filter(t => t.monthKey === monthKey && !t.isExcluded);
  const ea = t => t.adjustedAmount != null ? t.adjustedAmount : t.amount;
  const catTotals = {};
  for (const t of txs) catTotals[t.category] = (catTotals[t.category] || 0) + ea(t);
  const total = Object.values(catTotals).reduce((s, a) => s + a, 0);
  const summaryData = [
    ['Categoría', 'Monto (CLP)', '% del Total'],
    ...Object.entries(catTotals).sort((a, b) => b[1] - a[1])
      .map(([c, a]) => [c, a, (a / total * 100).toFixed(1) + '%']),
    ['TOTAL', total, '100%'],
  ];
  const detailData = [
    ['Fecha', 'Descripción', 'Categoría', 'Titular/Adicional', 'Fuente',
     'Mi Gasto', 'Valor Cuota Original', 'Monto Total', 'Cuotas Pendientes'],
    ...txs.sort((a, b) => b.date.localeCompare(a.date)).map(t =>
      [t.date, t.description, t.category, t.cardHolder, t.source,
       ea(t), t.amount, t.totalAmount, t.pendingCuotas]),
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(summaryData), 'Resumen por categoría');
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(detailData),  'Detalle transacciones');
  XLSX.writeFile(wb, 'Gastos_' + monthKey + '.xlsx');
}

// ─── STATE ────────────────────────────────────────────────────────────────────
function loadState() {
  try {
    const s = localStorage.getItem('gastos_v3');
    if (s) return JSON.parse(s);
  } catch (e) {}
  return null;
}
function saveState(s) {
  try { localStorage.setItem('gastos_v3', JSON.stringify(s)); } catch (e) {}
}
const initState = () => {
  const saved = loadState();
  if (saved?.customCategories?.length) {
    saved.customCategories.forEach(c => {
      if (!CATS[c.name]) CATS[c.name] = { color: c.color, emoji: c.emoji };
    });
  }
  // Init Supabase client if config exists (data loaded async in App useEffect)
  const sbCfg = getSbConfig();
  if (sbCfg?.url && sbCfg?.key) initSb(sbCfg.url, sbCfg.key);

  return {
    transactions: saved?.transactions?.length > 0 ? saved.transactions : SEED_DATA,
    customCategories: saved?.customCategories || [],
    currentMonthKey: saved?.currentMonthKey || '2026-04',
    cardHolderFilter: 'all',
    activeTab: 'dashboard',
    pending: null,
    modal: null,
    alert: null,
    syncStatus: sbCfg ? 'idle' : 'off',  // 'off'|'idle'|'syncing'|'synced'|'error'
    sbConnected: !!sbCfg,
  };
};
function reducer(state, action) {
  switch (action.type) {
    case 'SET_TAB': return { ...state, activeTab: action.tab };
    case 'SET_MONTH': return { ...state, currentMonthKey: action.key };
    case 'SET_FILTER': return { ...state, cardHolderFilter: action.filter };
    case 'SET_PENDING': return { ...state, pending: action.txs, activeTab: 'import' };
    case 'UPDATE_PENDING': return {
      ...state,
      pending: state.pending.map(t => t.id === action.id ? { ...t, category: action.cat } : t)
    };
    case 'CONFIRM_IMPORT': return {
      ...state, transactions: [...state.transactions, ...state.pending],
      pending: null, alert: { type: 'success', msg: `${state.pending.length} transacciones importadas.` }
    };
    case 'CANCEL_IMPORT': return { ...state, pending: null };
    case 'RECLASSIFY': return {
      ...state,
      transactions: state.transactions.map(t =>
        t.id === action.id ? { ...t, category: action.cat } : t)
    };
    case 'ADD_LIDER': {
      const t = { id: uid(), date: action.monthKey + '-01',
        rawDescription: 'Líder BCI', description: 'Líder BCI',
        amount: action.amount, totalAmount: action.amount, pendingCuotas: 0,
        category: 'Supermercados', cardHolder: 'N/A',
        source: 'LiderBCI', isExcluded: false, monthKey: action.monthKey };
      return { ...state, transactions: [...state.transactions, t],
        modal: null, alert: { type: 'success', msg: 'Compras Líder BCI agregadas.' } };
    }
    case 'ADD_MANUAL': {
      const t = { id: uid(), ...action.tx };
      return { ...state, transactions: [...state.transactions, t],
        modal: null, alert: { type: 'success', msg: 'Gasto manual agregado.' } };
    }
    case 'DELETE_MONTH': return {
      ...state,
      transactions: state.transactions.filter(t => t.monthKey !== action.key),
      alert: { type: 'success', msg: `Mes ${action.key} eliminado.` }
    };
    case 'SET_MODAL': return { ...state, modal: action.modal };
    case 'CLEAR_ALERT': return { ...state, alert: null };
    case 'ADD_CUSTOM_CATEGORY': {
      CATS[action.cat.name] = { color: action.cat.color, emoji: action.cat.emoji };
      return { ...state, customCategories: [...(state.customCategories||[]), action.cat] };
    }
    case 'ADJUST_AMOUNT': return {
      ...state,
      transactions: state.transactions.map(t => t.id === action.id
        ? { ...t,
            adjustedAmount: action.amount,
            originalAmount: t.originalAmount != null ? t.originalAmount : t.amount }
        : t)
    };
    case 'RESTORE_AMOUNT': return {
      ...state,
      transactions: state.transactions.map(t => t.id === action.id
        ? { ...t, adjustedAmount: null, originalAmount: null }
        : t)
    };
    case 'LOAD_CUSTOM_CATS': {
      // Merge remote custom categories into CATS and state (non-destructive)
      const incoming = action.categories || [];
      incoming.forEach(c => {
        if (!CATS[c.name]) CATS[c.name] = { color: c.color, emoji: c.emoji };
      });
      const existing = state.customCategories || [];
      const merged = [...existing];
      incoming.forEach(c => { if (!merged.find(m => m.name === c.name)) merged.push(c); });
      return { ...state, customCategories: merged };
    }
    case 'LOAD_TRANSACTIONS': return { ...state, transactions: action.transactions,
        syncStatus: 'synced', sbConnected: true };
    case 'SET_SYNC_STATUS': return { ...state, syncStatus: action.status };
    case 'SET_SB_CONNECTED': return { ...state, sbConnected: action.connected,
        syncStatus: action.connected ? 'idle' : 'off' };
    case 'RESTORE_FROM_BACKUP': {
      // Restore custom categories into CATS
      const customCats = action.data.customCategories || [];
      customCats.forEach(c => { if (!CATS[c.name]) CATS[c.name] = { color: c.color, emoji: c.emoji }; });
      return {
        ...state,
        transactions: action.data.transactions || [],
        customCategories: customCats,
        alert: { type: 'success', msg: `Respaldo restaurado: ${(action.data.transactions||[]).length} transacciones.` }
      };
    }
    default: return state;
  }
}

function CategoryPickerModal({ current, onSelect, onClose, dispatch }) {
  const [showAdd, setShowAdd] = useState(false);
  const [newName, setNewName] = useState('');
  const [newEmoji, setNewEmoji] = useState('🏷️');
  const allCats = Object.keys(CATS);
  const customCount = allCats.filter(c => !BUILT_IN_CAT_NAMES.has(c)).length;

  function addCategory() {
    const name = newName.trim();
    if (!name || CATS[name]) return;
    const color = CUSTOM_COLORS[customCount % CUSTOM_COLORS.length];
    const cat = { name, emoji: newEmoji || '🏷️', color };
    if (dispatch) dispatch({ type: 'ADD_CUSTOM_CATEGORY', cat });
    else { CATS[name] = { color: cat.color, emoji: cat.emoji }; }
    onSelect(name);
    onClose();
  }

  return (
    <div className="overlay" onClick={onClose}>
      <div className="modal" style={{ borderRadius: 20 }} onClick={e => e.stopPropagation()}>
        <div className="modal-handle" />
        <div className="modal-header">
          <span className="modal-title">Elegir categoría</span>
          <button className="btn btn-secondary btn-sm" onClick={onClose}>Cerrar</button>
        </div>
        <div className="modal-scroll">
          {allCats.map(cat => {
            const cfg = CATS[cat];
            const isCustom = !BUILT_IN_CAT_NAMES.has(cat);
            return (
              <div key={cat} onClick={() => { onSelect(cat); onClose(); }}
                style={{ display:'flex', alignItems:'center', gap:12, padding:'12px 16px',
                  cursor:'pointer', borderBottom:'1px solid var(--border)',
                  background: cat === current ? cfg.color + '18' : 'transparent' }}>
                <span style={{ fontSize:22 }}>{cfg.emoji}</span>
                <span style={{ flex:1, fontSize:15 }}>{cat}</span>
                {isCustom && <span style={{ fontSize:10, color:'var(--text3)',
                  background:'var(--surface2)', padding:'2px 6px', borderRadius:4 }}>custom</span>}
                {cat === current && <span style={{ color: cfg.color, marginLeft:4 }}>✓</span>}
              </div>
            );
          })}

          {/* Add new category */}
          {!showAdd ? (
            <div onClick={() => setShowAdd(true)}
              style={{ display:'flex', alignItems:'center', gap:12, padding:'14px 16px',
                cursor:'pointer', color:'var(--accent)' }}>
              <span style={{ fontSize:20 }}>＋</span>
              <span style={{ fontSize:14, fontWeight:500 }}>Nueva categoría</span>
            </div>
          ) : (
            <div style={{ padding:'14px 16px', borderTop:'1px solid var(--border)' }}>
              <div style={{ fontSize:13, fontWeight:600, color:'var(--text2)', marginBottom:10 }}>
                Nueva categoría
              </div>
              <div style={{ display:'flex', gap:8, marginBottom:8 }}>
                <input placeholder="Emoji" value={newEmoji}
                  onChange={e => setNewEmoji(e.target.value)}
                  style={{ width:60, textAlign:'center', fontSize:20, padding:'6px 4px' }} />
                <input placeholder="Nombre (ej: Mascota)" value={newName}
                  onChange={e => setNewName(e.target.value)}
                  style={{ flex:1 }}
                  onKeyDown={e => e.key==='Enter' && addCategory()} />
              </div>
              <div style={{ display:'flex', gap:8 }}>
                <button className="btn btn-primary btn-sm"
                  disabled={!newName.trim() || !!CATS[newName.trim()]}
                  onClick={addCategory}>Crear</button>
                <button className="btn btn-secondary btn-sm"
                  onClick={() => { setShowAdd(false); setNewName(''); }}>Cancelar</button>
              </div>
              {CATS[newName.trim()] && newName.trim() &&
                <div style={{ fontSize:11, color:'var(--neg)', marginTop:6 }}>
                  Ya existe una categoría con ese nombre.
                </div>}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

  const cmrBilledTotal = pending
    .filter(t => !t.rawDescription.toUpperCase().includes('PAGO TARJETA CMR'))
    .reduce((s, t) => s + t.amount, 0);
  const expectedParsed = parseInt(expectedTotal.replace(/[.\s]/g, '')) || 0;
  const diff = expectedParsed > 0 ? cmrBilledTotal - expectedParsed : null;

  return (
    <div className="overlay">
      <div className="modal">
        <div className="modal-handle" />
        <div className="modal-header">
          <span className="modal-title">Revisar importación</span>
          <button className="btn btn-secondary btn-sm"
            onClick={() => dispatch({ type: 'CANCEL_IMPORT' })}>Cancelar</button>
        </div>

        {/* Summary */}
        <div className="summary-box">
          <div className="summary-stat">
            <div className="summary-val">{fmtCLPShort(grossTotal)}</div>
            <div className="summary-lbl">Compras</div>
          </div>
          <div className="summary-stat">
            <div className="summary-val" style={{ color:'var(--pos)' }}>
              {grossTotal !== netTotal ? fmtCLPShort(netTotal - grossTotal) : '—'}
            </div>
            <div className="summary-lbl">Devoluciones</div>
          </div>
          <div className="summary-stat">
            <div className="summary-val">{fmtCLPShort(cmrBilledTotal)}</div>
            <div className="summary-lbl">CMR facturado</div>
          </div>
          <div className="summary-stat">
            <div className="summary-val">{excluded.length}</div>
            <div className="summary-lbl">Excluidas</div>
          </div>
        </div>

        <div className="modal-scroll">
          <div className="section-header">Transacciones ({included.length})</div>
          {included.sort((a, b) => b.date.localeCompare(a.date)).map(tx => (
            <div key={tx.id} className="review-row">
              <div className="review-meta">
                <div className="review-desc">{tx.description}</div>
                <div className="review-detail">
                  <span>{fmtDate(tx.date)}</span>
                  {tx.cardHolder === 'Adicional' &&
                    <span className="holder-badge">Adicional</span>}
                  {tx.pendingCuotas > 0 &&
                    <span style={{ color:'var(--text3)' }}>{tx.pendingCuotas} cuotas</span>}
                </div>
                <CatBadge category={tx.category} editable
                  onClick={() => setPickingFor(tx)} />
              </div>
              <div className="review-right">
                <div className="review-amount"
                  style={{ color: tx.amount < 0 ? 'var(--pos)' : 'var(--text)' }}>
                  {fmtCLP(tx.amount)}
                </div>
              </div>
            </div>
          ))}

          {excluded.length > 0 && <>
            <div className="section-header"
              style={{ cursor:'pointer', display:'flex', justifyContent:'space-between' }}
              onClick={() => setShowExcluded(v => !v)}>
              <span>Excluidos del análisis ({excluded.length})</span>
              <span>{showExcluded ? '▲' : '▼'}</span>
            </div>
            {showExcluded && excluded.map(tx => (
              <div key={tx.id} className="review-row" style={{ opacity: .5 }}>
                <div className="review-meta">
                  <div className="review-desc">{tx.description}</div>
                  <div className="review-detail"><span>{fmtDate(tx.date)}</span></div>
                </div>
                <div className="review-right">
                  <div className="review-amount">{fmtCLP(tx.amount)}</div>
                </div>
              </div>
            ))}
          </>}
        </div>

        <div className="modal-footer">
          {/* Verification input */}
          <div style={{ marginBottom:10 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8 }}>
              <input
                placeholder="Verificar: total facturado CMR (opcional)"
                value={expectedTotal}
                onChange={e => setExpectedTotal(e.target.value)}
                style={{ flex:1, fontSize:13, padding:'8px 10px' }} />
              {diff !== null && (
                <span style={{ fontSize:13, fontWeight:600, whiteSpace:'nowrap',
                  color: diff === 0 ? 'var(--pos)' : 'var(--neg)' }}>
                  {diff === 0 ? '✓ Coincide' : (diff > 0 ? `+${fmtCLPShort(diff)}` : fmtCLPShort(diff))}
                </span>
              )}
            </div>
            {diff !== null && diff !== 0 && (
              <div style={{ fontSize:11, color:'var(--text3)', marginTop:4 }}>
                CMR calculado {fmtCLP(cmrBilledTotal)} · Ingresado {fmtCLP(expectedParsed)} · Diferencia {fmtCLP(diff)}
              </div>
            )}
          </div>
          <button className="btn btn-primary btn-full"
            onClick={() => dispatch({ type: 'CONFIRM_IMPORT' })}>
            Confirmar ({included.length} txs · neto {fmtCLPShort(netTotal)})
          </button>
        </div>
      </div>

      {pickingFor && (
        <CategoryPickerModal current={pickingFor.category}
          onSelect={cat => dispatch({ type: 'UPDATE_PENDING', id: pickingFor.id, cat })}
          onClose={() => setPickingFor(null)} />
      )}
    </div>
  );
}

// ─── DASHBOARD TAB ────────────────────────────────────────────────────────────
function DashboardTab({ state, dispatch }) {
  const { transactions, currentMonthKey, cardHolderFilter } = state;
  const [showExcluded, setShowExcluded] = useState(false);
  const [catModal, setCatModal] = useState(null);

  const monthTxs = transactions.filter(t => t.monthKey === currentMonthKey);
  const prevKey   = monthKeyOffset(currentMonthKey, -1);
  const prevTxs   = transactions.filter(t => t.monthKey === prevKey);

  function applyFilter(txs) {
    if (cardHolderFilter === 'all') return txs;
    return txs.filter(t => t.cardHolder === cardHolderFilter);
  }

  const included = applyFilter(monthTxs.filter(t => !t.isExcluded));
  const excluded = monthTxs.filter(t => t.isExcluded);
  const total = included.reduce((s, t) => s + eff(t), 0);

  // Build category summaries
  const catMap = {};
  for (const t of included) {
    if (!catMap[t.category]) catMap[t.category] = 0;
    catMap[t.category] += eff(t);
  }
  const prevCatMap = {};
  for (const t of applyFilter(prevTxs.filter(t => !t.isExcluded))) {
    if (!prevCatMap[t.category]) prevCatMap[t.category] = 0;
    prevCatMap[t.category] += eff(t);
  }
  const summaries = Object.entries(catMap)
    .filter(([, amt]) => amt > 0)
    .sort((a, b) => b[1] - a[1])
    .map(([cat, amt]) => ({ cat, amt, prev: prevCatMap[cat] || 0 }));
  const maxAmt = summaries[0]?.amt || 1;
  const canGoNext = monthKeyOffset(currentMonthKey, 1) <= monthKeyNow();

  return (
    <div className="scroll">
      {/* Month navigator */}
      <div className="month-nav">
        <button className="nav-btn"
          onClick={() => dispatch({ type:'SET_MONTH', key: monthKeyOffset(currentMonthKey,-1) })}>
          ‹
        </button>
        <span className="month-label">{monthDisplay(currentMonthKey)}</span>
        <button className="nav-btn" disabled={!canGoNext}
          onClick={() => dispatch({ type:'SET_MONTH', key: monthKeyOffset(currentMonthKey,1) })}>
          ›
        </button>
      </div>

      {/* Total card */}
      <div className="total-card">
        <div className="total-label">Total del mes</div>
        <div className="total-amount">{fmtCLP(total)}</div>
        <div className="filter-pills">
          {['all','Titular','Adicional'].map(f => (
            <button key={f} className={'pill ' + (cardHolderFilter===f?'active':'inactive')}
              onClick={() => dispatch({ type:'SET_FILTER', filter:f })}>
              {f === 'all' ? 'Todo' : f}
            </button>
          ))}
        </div>
      </div>

      {/* Categories */}
      {summaries.length === 0 && (
        <div className="empty">
          <div className="empty-icon">📊</div>
          <div style={{ fontWeight:600, marginBottom:6 }}>Sin datos para este mes</div>
          <div style={{ fontSize:13 }}>Importa tu cartola desde la pestaña Importar</div>
        </div>
      )}
      {summaries.map(({ cat, amt, prev }) => {
        const cfg = CATS[cat] || CATS['Otros'];
        const pct = prev > 0 ? ((amt - prev) / prev * 100) : null;
        const fill = amt / maxAmt * 100;
        return (
          <div key={cat} className="cat-card" onClick={() => setCatModal(cat)}>
            <div className="cat-row">
              <div className="cat-icon-wrap" style={{ background: cfg.color + '22' }}>
                <span>{cfg.emoji}</span>
              </div>
              <div className="cat-info">
                <div className="cat-name">{cat}</div>
                <div className="cat-sub">
                  {pct !== null ? (
                    <span style={{ color: pct > 0 ? 'var(--neg)' : 'var(--pos)' }}>
                      {pct > 0 ? '▲' : '▼'} {Math.abs(Math.round(pct))}% vs mes ant.
                    </span>
                  ) : (
                    <span>{monthTxs.filter(t=>t.category===cat&&!t.isExcluded).length} transacciones</span>
                  )}
                </div>
              </div>
              <div className="cat-amount">{fmtCLP(amt)}</div>
              <span style={{ color:'var(--text3)', fontSize:12, marginLeft:4 }}>›</span>
            </div>
            <div className="progress-bar">
              <div className="progress-fill"
                style={{ width: fill + '%', background: cfg.color }} />
            </div>
          </div>
        );
      })}

      {/* Excluded */}
      {excluded.length > 0 && (
        <div>
          <div className="excluded-toggle" onClick={() => setShowExcluded(v=>!v)}>
            <span style={{ color:'var(--text2)', fontSize:14 }}>
              Pagos excluidos ({excluded.length})
            </span>
            <span style={{ color:'var(--text3)' }}>{showExcluded?'▲':'▼'}</span>
          </div>
          {showExcluded && (
            <div style={{ background:'var(--surface)', borderRadius:'var(--radius)', marginBottom:8 }}>
              {excluded.map((t, i) => (
                <div key={t.id} className="excluded-row">
                  <div>
                    <div style={{ fontSize:13, color:'var(--text2)' }}>{t.description}</div>
                    <div style={{ fontSize:11, color:'var(--text3)' }}>{fmtDate(t.date)}</div>
                  </div>
                  <div style={{ color:'var(--text2)', fontSize:13 }}>{fmtCLP(t.amount)}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Export button */}
      {summaries.length > 0 && (
        <button className="btn btn-secondary btn-full" style={{ marginTop:4 }}
          onClick={() => exportMonthly(currentMonthKey, transactions)}>
          Exportar mes a Excel ↗
        </button>
      )}

      {catModal && (
        <CatModal category={catModal}
          transactions={monthTxs}
          onClose={() => setCatModal(null)}
          dispatch={dispatch} />
      )}
    </div>
  );
}

// ─── IMPORT TAB ───────────────────────────────────────────────────────────────
function ImportTab({ state, dispatch }) {
  const [parsing, setParsing] = useState(false);
  const [parseError, setParseError] = useState(null);
  const fileRef = useRef();

  async function handleFile(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    setParsing(true); setParseError(null);
    try {
      const txs = await parseCMRFile(file);
      dispatch({ type: 'SET_PENDING', txs });
    } catch (err) {
      setParseError(err.message);
    } finally {
      setParsing(false);
      e.target.value = '';
    }
  }

  return (
    <div className="scroll">
      <div style={{ marginBottom:4, paddingTop:4 }}>
        <div style={{ fontSize:22, fontWeight:700, marginBottom:16 }}>Importar</div>

        {parseError && (
          <div className="alert alert-error">{parseError}</div>
        )}

        {/* CMR */}
        <div className="import-card" onClick={() => fileRef.current?.click()}>
          <div className="import-header">
            <div className="import-icon" style={{ background:'rgba(239,68,68,.15)' }}>💳</div>
            <div>
              <div style={{ fontWeight:600 }}>Cartola CMR Falabella</div>
              <div style={{ fontSize:13, color:'var(--text2)', marginTop:2 }}>
                Archivo Excel (.xlsx)
              </div>
              <div style={{ fontSize:12, color:'var(--text3)', marginTop:2 }}>
                Hoja «Movimientos Facturados» — categorización automática
              </div>
            </div>
          </div>
        </div>
        <input ref={fileRef} type="file" accept=".xlsx,.xls"
          style={{ display:'none' }} onChange={handleFile} />

        {/* Líder BCI */}
        <div className="import-card">
          <div className="import-header"
            onClick={() => dispatch({ type:'SET_MODAL', modal:'lider' })}>
            <div className="import-icon" style={{ background:'rgba(30,136,229,.15)' }}>🛒</div>
            <div>
              <div style={{ fontWeight:600 }}>Cartola Líder BCI</div>
              <div style={{ fontSize:13, color:'var(--text2)', marginTop:2 }}>
                Ingresar total mensual
              </div>
              <div style={{ fontSize:12, color:'var(--text3)', marginTop:2 }}>
                Se registra como una línea de Supermercados
              </div>
            </div>
          </div>
        </div>

        {/* Manual */}
        <div className="import-card">
          <div className="import-header"
            onClick={() => dispatch({ type:'SET_MODAL', modal:'manual' })}>
            <div className="import-icon" style={{ background:'rgba(34,197,94,.15)' }}>✏️</div>
            <div>
              <div style={{ fontWeight:600 }}>Gasto manual</div>
              <div style={{ fontSize:13, color:'var(--text2)', marginTop:2 }}>
                Arriendo, hipotecario, gastos comunes
              </div>
              <div style={{ fontSize:12, color:'var(--text3)', marginTop:2 }}>
                Cualquier gasto que no aparezca en cartolas
              </div>
            </div>
          </div>
        </div>

        {parsing && (
          <div className="loading"><div className="spinner"/><span>Procesando Excel…</span></div>
        )}
      </div>
    </div>
  );
}

// ─── HISTORY TAB ──────────────────────────────────────────────────────────────
function BarChart({ data }) {
  const max = Math.max(...data.map(d => d.total), 1);
  const w = 460; const h = 160; const barW = Math.floor((w - 40) / data.length - 4);
  return (
    <svg viewBox={`0 0 ${w} ${h + 30}`} style={{ width:'100%', overflow:'visible' }}>
      {data.map((d, i) => {
        const x = 20 + i * ((w - 40) / data.length);
        const barH = d.total > 0 ? Math.max(4, (d.total / max) * h) : 2;
        const y = h - barH;
        return (
          <g key={d.key} className="chart-bar">
            <rect x={x} y={y} width={barW} height={barH} rx={3}
              fill={d.key === (new Date().toISOString().slice(0,7)) ? '#3B82F6' : '#334155'} />
            <text x={x + barW / 2} y={h + 16} textAnchor="middle"
              fill="#64748B" fontSize={9}>
              {d.label}
            </text>
            {d.total > 0 && (
              <text x={x + barW / 2} y={y - 4} textAnchor="middle"
                fill="#94A3B8" fontSize={9}>
                {fmtCLPShort(d.total)}
              </text>
            )}
          </g>
        );
      })}
    </svg>
  );
}

function HistoryTab({ state }) {
  const { transactions } = state;
  const [expanded, setExpanded] = useState(null);

  // Last 12 months trend
  const now = new Date();
  const trend = Array.from({ length: 12 }, (_, i) => {
    const d = new Date(now.getFullYear(), now.getMonth() - 11 + i, 1);
    const key = d.toISOString().slice(0, 7);
    const label = d.toLocaleDateString('es-CL', { month: 'short', year: '2-digit' });
    const total = transactions
      .filter(t => t.monthKey === key && !t.isExcluded)
      .reduce((s, t) => s + eff(t), 0);
    return { key, label, total };
  });

  // Available months
  const months = [...new Set(transactions.map(t => t.monthKey))].sort().reverse();

  return (
    <div className="scroll">
      <div style={{ fontSize:22, fontWeight:700, marginBottom:16, paddingTop:4 }}>Historial</div>

      {/* Trend chart */}
      {trend.some(d => d.total > 0) ? (
        <div className="card" style={{ marginBottom:14 }}>
          <div style={{ fontSize:13, color:'var(--text2)', marginBottom:8 }}>
            Últimos 12 meses
          </div>
          <div className="chart-wrap" style={{ padding:'8px 0 0' }}>
            <BarChart data={trend} />
          </div>
        </div>
      ) : (
        <div className="empty">
          <div className="empty-icon">📈</div>
          <div style={{ fontWeight:600, marginBottom:6 }}>Sin historial aún</div>
          <div style={{ fontSize:13 }}>Importa al menos un mes para ver tendencias</div>
        </div>
      )}

      {/* Monthly breakdown */}
      {months.map(key => {
        const txs = transactions.filter(t => t.monthKey === key && !t.isExcluded);
        const total = txs.reduce((s, t) => s + eff(t), 0);
        const catMap = {};
        for (const t of txs) catMap[t.category] = (catMap[t.category] || 0) + eff(t);
        const cats = Object.entries(catMap).sort((a, b) => b[1] - a[1]);
        const isOpen = expanded === key;
        return (
          <div key={key} className="hist-row">
            <div className="hist-summary" onClick={() => setExpanded(isOpen ? null : key)}>
              <div>
                <div style={{ fontWeight:600, fontSize:15 }}>{monthDisplay(key)}</div>
                <div style={{ fontSize:12, color:'var(--text2)', marginTop:2 }}>
                  {txs.length} transacciones
                </div>
              </div>
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <span style={{ fontWeight:700, fontSize:16 }}>{fmtCLPShort(total)}</span>
                <span style={{ color:'var(--text3)' }}>{isOpen ? '▲' : '▼'}</span>
              </div>
            </div>
            {isOpen && (
              <div className="hist-detail">
                {cats.map(([cat, amt]) => {
                  const cfg = CATS[cat] || CATS['Otros'];
                  return (
                    <div key={cat} className="hist-cat-row">
                      <span>{cfg.emoji} {cat}</span>
                      <span style={{ fontWeight:500 }}>{fmtCLP(amt)}</span>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── SETTINGS TAB ─────────────────────────────────────────────────────────────
function SettingsTab({ state, dispatch }) {
  const { transactions } = state;
  const months = [...new Set(transactions.map(t => t.monthKey))].sort().reverse();
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [restoreError, setRestoreError] = useState(null);
  const [sbUrl, setSbUrl] = useState('');
  const [sbKey, setSbKey] = useState('');
  const [sbLoading, setSbLoading] = useState(false);
  const [sbError, setSbError] = useState('');
  const restoreRef = React.useRef();

  async function connectSupabase() {
    setSbLoading(true); setSbError('');
    const result = await sbTestConnection(sbUrl.trim(), sbKey.trim());
    if (!result.ok) { setSbError(result.msg); setSbLoading(false); return; }
    // Save config and init client
    const cfg = { url: sbUrl.trim(), key: sbKey.trim() };
    setSbConfig(cfg);
    _sb = result.client;
    // Load transactions: pull from Supabase if has data, else push local
    const [remoteTx, remoteCats] = await Promise.all([sbLoad(), sbLoadCustomCats()]);
    if (remoteTx && remoteTx.length > 0) {
      dispatch({ type: 'LOAD_TRANSACTIONS', transactions: remoteTx });
    } else {
      await _sb.from('transactions').upsert(transactions.map(txToRow));
    }
    // Load/push custom categories
    const localCats = state.customCategories || [];
    if (remoteCats && remoteCats.length > 0) {
      dispatch({ type: 'LOAD_CUSTOM_CATS', categories: remoteCats });
    } else if (localCats.length > 0) {
      await Promise.all(localCats.map(c => sbSyncCustomCat(c)));
    }
    setSbLoading(false);
    dispatch({ type: 'SET_SB_CONNECTED', connected: true });
    dispatch({ type: 'SET_SYNC_STATUS', status: 'synced' });
    dispatch({ type:'SET_TAB', tab:'dashboard' });
  }

  function disconnectSupabase() {
    setSbConfig(null); _sb = null;
    dispatch({ type: 'SET_SB_CONNECTED', connected: false });
    setSbUrl(''); setSbKey('');
  }

  // ── Generar app actualizada con datos actuales (para iPhone/otros dispositivos) ─
  function generateUpdatedApp() {
    // Get the full HTML source from the current document
    const src = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
    // Find the seed markers and replace with current transactions
    const startMark = '/* ==SEED_START== */\n';
    const endMark   = '\n/* ==SEED_END== */';
    const si = src.indexOf(startMark);
    const ei = src.indexOf(endMark, si);
    if (si < 0 || ei < 0) {
      alert('Error: no se encontraron los marcadores de datos. Contacta al desarrollador.');
      return;
    }
    const newSeed = `const SEED_DATA = ${JSON.stringify(state.transactions)};`;
    const updated = src.slice(0, si + startMark.length) + newSeed + src.slice(ei);
    const blob = new Blob([updated], { type: 'text/html; charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'Gastos Personal.html';
    a.click();
    URL.revokeObjectURL(url);
  }

  // ── Backup: export full state to JSON ──────────────────────────────────────
  function exportBackup() {
    const payload = {
      version: 3,
      exportDate: new Date().toISOString().slice(0,10),
      transactions: state.transactions,
      customCategories: state.customCategories || [],
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'GastosPersonal_backup_' + payload.exportDate + '.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  // ── Restore: import backup JSON ────────────────────────────────────────────
  function handleRestoreFile(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data.transactions)) throw new Error('Formato inválido.');
        dispatch({ type: 'RESTORE_FROM_BACKUP', data });
        setRestoreError(null);
      } catch(err) {
        setRestoreError('Error al leer el archivo: ' + err.message);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  // Count customized transactions (reclassified, amount-adjusted, manual)
  const customized = transactions.filter(t =>
    t.adjustedAmount != null || t.source === 'Manual' || t.source === 'LiderBCI'
  ).length;
  const reclassified = transactions.filter(t => t.adjustedAmount != null).length;

  return (
    <div className="scroll">
      <div style={{ fontSize:22, fontWeight:700, marginBottom:16, paddingTop:4 }}>Ajustes</div>

      {/* ── SUPABASE SYNC ── */}
      {!state.sbConnected ? (
        <div className="card" style={{ border:'1px solid rgba(34,197,94,.3)' }}>
          <div style={{ fontSize:13, fontWeight:600, color:'#22C55E',
            textTransform:'uppercase', letterSpacing:'.5px', marginBottom:8 }}>
            ☁️ Sincronización en la nube
          </div>
          <p style={{ fontSize:13, color:'var(--text2)', lineHeight:1.5, marginBottom:12 }}>
            Conecta Supabase (gratis) para sincronizar automáticamente entre Mac e iPhone.
            Importa desde cualquier dispositivo y los datos aparecen en todos.
          </p>
          <label>URL del proyecto Supabase</label>
          <input value={sbUrl} onChange={e => setSbUrl(e.target.value)}
            placeholder="https://xxxx.supabase.co" style={{ marginBottom:8 }} />
          <label>Anon Key</label>
          <input value={sbKey} onChange={e => setSbKey(e.target.value)}
            placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." style={{ marginBottom:8 }} />
          {sbError && <div className="alert alert-error" style={{ marginBottom:8 }}>{sbError}</div>}
          <button className="btn btn-full" disabled={!sbUrl||!sbKey||sbLoading}
            style={{ background:'rgba(34,197,94,.2)', color:'#22C55E',
              border:'1px solid rgba(34,197,94,.3)', fontWeight:600 }}
            onClick={connectSupabase}>
            {sbLoading ? '⟳ Conectando...' : '☁ Conectar Supabase'}
          </button>
          <div style={{ fontSize:11, color:'var(--text3)', marginTop:8, lineHeight:1.5 }}>
            ¿No tienes cuenta? supabase.com → New project → Settings → API
          </div>
        </div>
      ) : (
        <div className="card" style={{ border:'1px solid rgba(34,197,94,.5)' }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
            <div>
              <div style={{ fontSize:13, fontWeight:600, color:'#22C55E', marginBottom:4 }}>
                ☁️ Supabase conectado
              </div>
              <div style={{ fontSize:12, color:'var(--text2)' }}>
                {state.syncStatus === 'syncing' ? '⟳ Sincronizando...' :
                 state.syncStatus === 'error'   ? '⚠ Error de sincronización' :
                 '✓ Datos sincronizados en la nube'}
              </div>
            </div>
            <button className="btn btn-secondary btn-sm" onClick={disconnectSupabase}>
              Desconectar
            </button>
          </div>
        </div>
      )}

      {/* ── SYNC IPHONE ── */}
      <div className="card" style={{ border:'1px solid rgba(255,152,0,.3)' }}>
        <div style={{ fontSize:13, fontWeight:600, color:'#FF9800',
          textTransform:'uppercase', letterSpacing:'.5px', marginBottom:8 }}>
          📱 Ver en iPhone
        </div>
        <p style={{ fontSize:13, color:'var(--text2)', lineHeight:1.5, marginBottom:12 }}>
          Genera un nuevo HTML con todos tus datos actuales baked-in.
          Al guardarlo en la misma carpeta de iCloud, se sincroniza al iPhone
          automáticamente. Ábrelo desde la app Archivos → Safari.
        </p>
        <button className="btn btn-full" onClick={generateUpdatedApp}
          style={{ background:'rgba(255,152,0,.2)', color:'#FF9800',
            border:'1px solid rgba(255,152,0,.3)', fontWeight:600 }}>
          📲 Generar app actualizada
        </button>
        <div style={{ fontSize:11, color:'var(--text3)', marginTop:8, lineHeight:1.5 }}>
          Descarga «Gastos Personal.html» → muévelo a tu carpeta iCloud →
          iCloud lo sincroniza → en iPhone: Archivos → toca el archivo → se abre en Safari.
          Los datos aparecen al instante, sin importar nada.
        </div>
      </div>

      {/* ── BACKUP SECTION ── */}
      <div className="card" style={{ border:'1px solid rgba(59,130,246,.3)' }}>
        <div style={{ fontSize:13, fontWeight:600, color:'var(--accent)',
          textTransform:'uppercase', letterSpacing:'.5px', marginBottom:10 }}>
          💾 Respaldo de datos
        </div>
        <p style={{ fontSize:13, color:'var(--text2)', lineHeight:1.5, marginBottom:12 }}>
          Exporta tus datos antes de pedir cambios en la app.
          Cuando recibas el HTML actualizado, importa el respaldo para recuperar
          todas tus reclasificaciones, ajustes de monto y entradas manuales.
        </p>
        <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
          <button className="btn btn-primary" onClick={exportBackup}
            style={{ flex:1, minWidth:140 }}>
            ⬇ Exportar respaldo JSON
          </button>
          <button className="btn btn-secondary" style={{ flex:1, minWidth:140 }}
            onClick={() => restoreRef.current?.click()}>
            ⬆ Importar respaldo
          </button>
          <input ref={restoreRef} type="file" accept=".json"
            style={{ display:'none' }} onChange={handleRestoreFile} />
        </div>
        {restoreError && (
          <div className="alert alert-error" style={{ marginTop:8, marginBottom:0 }}>
            {restoreError}
          </div>
        )}
        <div style={{ fontSize:11, color:'var(--text3)', marginTop:10, display:'flex', gap:16 }}>
          <span>{transactions.length} transacciones</span>
          <span>{customized} entradas manuales/Líder</span>
          <span>{reclassified} montos ajustados</span>
        </div>
      </div>

      {/* ── DATA STATS ── */}
      <div className="card">
        <div style={{ fontSize:13, fontWeight:600, color:'var(--text2)',
          textTransform:'uppercase', letterSpacing:'.5px', marginBottom:10 }}>
          Datos almacenados
        </div>
        <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6, fontSize:14 }}>
          <span style={{ color:'var(--text2)' }}>Total transacciones</span>
          <span style={{ fontWeight:600 }}>{transactions.length}</span>
        </div>
        <div style={{ display:'flex', justifyContent:'space-between', marginBottom:6, fontSize:14 }}>
          <span style={{ color:'var(--text2)' }}>Meses con datos</span>
          <span style={{ fontWeight:600 }}>{months.length}</span>
        </div>
        <div style={{ display:'flex', justifyContent:'space-between', fontSize:14 }}>
          <span style={{ color:'var(--text2)' }}>Reclasificaciones manuales</span>
          <span style={{ fontWeight:600 }}>
            {transactions.filter(t => t.source==='Manual').length +
             transactions.filter(t => t.adjustedAmount != null).length}
          </span>
        </div>
      </div>

      {/* ── DELETE BY MONTH ── */}
      {months.length > 0 && (
        <div className="card">
          <div style={{ fontSize:13, fontWeight:600, color:'var(--text2)',
            textTransform:'uppercase', letterSpacing:'.5px', marginBottom:12 }}>
            Eliminar mes
          </div>
          {months.map(key => (
            <div key={key} style={{ display:'flex', justifyContent:'space-between',
              alignItems:'center', marginBottom:10 }}>
              <div>
                <div style={{ fontSize:14 }}>{monthDisplay(key)}</div>
                <div style={{ fontSize:11, color:'var(--text3)' }}>
                  {transactions.filter(t => t.monthKey === key).length} transacciones
                </div>
              </div>
              {confirmDelete === key ? (
                <div style={{ display:'flex', gap:6 }}>
                  <button className="btn btn-danger btn-sm"
                    onClick={() => { dispatch({ type:'DELETE_MONTH', key }); setConfirmDelete(null); }}>
                    Eliminar
                  </button>
                  <button className="btn btn-secondary btn-sm"
                    onClick={() => setConfirmDelete(null)}>Cancelar</button>
                </div>
              ) : (
                <button className="btn btn-secondary btn-sm"
                  onClick={() => setConfirmDelete(key)}>
                  🗑️ Borrar
                </button>
              )}
            </div>
          ))}
        </div>
      )}

      <div className="card" style={{ fontSize:13, color:'var(--text2)', lineHeight:1.6 }}>
        <div style={{ fontWeight:600, color:'var(--text)', marginBottom:6 }}>Acerca de</div>
        Gastos Personal v1.0 · Chile 🇨🇱
        <br/>Datos guardados localmente en este browser.
      </div>
    </div>
  );
}

// ─── APP ROOT ─────────────────────────────────────────────────────────────────
function App() {
  const [state, dispatch] = useReducer(reducer, null, initState);
  const isFirstRender = useRef(true);

  // Persist to localStorage on every state change
  useEffect(() => {
    saveState({ transactions: state.transactions, currentMonthKey: state.currentMonthKey,
              customCategories: state.customCategories || [] });
  }, [state.transactions, state.currentMonthKey, state.customCategories]);

  // Load fresh data from Supabase on mount (if configured)
  useEffect(() => {
    const cfg = getSbConfig();
    if (!cfg?.url) return;
    dispatch({ type: 'SET_SYNC_STATUS', status: 'syncing' });
    Promise.all([sbLoad(), sbLoadCustomCats()]).then(([txData, catData]) => {
      if (txData) dispatch({ type: 'LOAD_TRANSACTIONS', transactions: txData });
      else        dispatch({ type: 'SET_SYNC_STATUS', status: 'error' });
      if (catData?.length) dispatch({ type: 'LOAD_CUSTOM_CATS', categories: catData });
    });
  }, []);

  // Sync custom categories to Supabase when they change
  useEffect(() => {
    if (!state.sbConnected || !state.customCategories?.length) return;
    state.customCategories.forEach(cat => sbSyncCustomCat(cat));
  }, [state.customCategories]);

  // Sync to Supabase on every transaction change (skip first render)
  useEffect(() => {
    if (isFirstRender.current) { isFirstRender.current = false; return; }
    if (!state.sbConnected) return;
    dispatch({ type: 'SET_SYNC_STATUS', status: 'syncing' });
    sbSync(state.transactions);
    // Optimistic update: mark synced after debounce delay + buffer
    const t = setTimeout(() => dispatch({ type: 'SET_SYNC_STATUS', status: 'synced' }), 1500);
    return () => clearTimeout(t);
  }, [state.transactions]);

  // Auto-dismiss alert
  useEffect(() => {
    if (state.alert) {
      const t = setTimeout(() => dispatch({ type: 'CLEAR_ALERT' }), 3000);
      return () => clearTimeout(t);
    }
  }, [state.alert]);

  // Sync status indicator (top-right corner)
  const syncDot = state.sbConnected ? {
    syncing: { color:'#FFC107', label:'⟳' },
    synced:  { color:'#22C55E', label:'☁' },
    idle:    { color:'#22C55E', label:'☁' },
    error:   { color:'#EF4444', label:'⚠' },
  }[state.syncStatus] || null : null;

  const tabs = [
    { id:'dashboard', label:'Resumen',  icon:'📊' },
    { id:'import',    label:'Importar', icon:'📥' },
    { id:'history',   label:'Historial',icon:'📈' },
    { id:'settings',  label:'Ajustes',  icon:'⚙️' },
  ];

  return (
    <div className="app">
      {/* Sync indicator */}
      {syncDot && (
        <div style={{ position:'fixed', top:10, right:14, zIndex:400,
          fontSize:18, color: syncDot.color, lineHeight:1 }}
          title={state.syncStatus}>
          {syncDot.label}
        </div>
      )}
      {/* Alert */}
      {state.alert && (
        <div style={{ position:'fixed', top:16, left:'50%', transform:'translateX(-50%)',
          zIndex:300, width:'calc(100% - 32px)', maxWidth:488 }}>
          <div className={'alert ' + (state.alert.type==='success'?'alert-success':'alert-error')}>
            {state.alert.msg}
          </div>
        </div>
      )}

      {/* Tab content */}
      {state.activeTab === 'dashboard' &&
        <DashboardTab state={state} dispatch={dispatch} />}
      {state.activeTab === 'import' &&
        <ImportTab state={state} dispatch={dispatch} />}
      {state.activeTab === 'history' &&
        <HistoryTab state={state} />}
      {state.activeTab === 'settings' &&
        <SettingsTab state={state} dispatch={dispatch} />}

      {/* Tab bar */}
      <div className="tabbar">
        {tabs.map(t => (
          <button key={t.id} className={'tab ' + (state.activeTab===t.id?'active':'')}
            onClick={() => dispatch({ type:'SET_TAB', tab:t.id })}>
            <span className="tab-icon">{t.icon}</span>
            <span>{t.label}</span>
          </button>
        ))}
      </div>

      {/* Modals */}
      {state.pending && (
        <ReviewModal pending={state.pending} dispatch={dispatch} />
      )}
      {state.modal === 'lider' && (
        <LiderModal dispatch={dispatch} currentMonthKey={state.currentMonthKey} />
      )}
      {state.modal === 'manual' && (
        <ManualModal dispatch={dispatch} />
      )}
    </div>
  );
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
